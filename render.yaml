services:
  # Backend Node.js Web Service
  - type: web
    name: syncspace-backend
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        value: mongodb://gopichand:chand1231@ac-hqejzkx-shard-00-00.dsywzlr.mongodb.net:27017,ac-hqejzkx-shard-00-01.dsywzlr.mongodb.net:27017,ac-hqejzkx-shard-00-02.dsywzlr.mongodb.net:27017/syncspace?ssl=true&authSource=admin
      - key: JWT_ACCESS_SECRET
        value: 7e64f1c13295b898ce2baf9155623a59fb8cb8576c069227b3ccfedf0d1c2e4be51cc74d5cc891bc51394036df717699
      - key: JWT_REFRESH_SECRET
        value: 7e8938d0b8d45626f5f082b96731ba637db07287f85ca111f16af585caffd7a93edf75d47cc25b64a7aee82e517240c4
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://syncspace-frontend-05u3.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
