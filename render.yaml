  # Frontend React/Vite Static Site
  - type: web
    name: syncspace-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://syncspace-backend-44cl.onrender.com/api/v1
      - key: VITE_SOCKET_URL
