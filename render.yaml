services:
  # ──────────────────────────────────────────────────────────────────────
  # Backend: Node.js Web Service
  # Deploy URL: https://syncspace-backend-44cl.onrender.com
  # ──────────────────────────────────────────────────────────────────────
  - type: web
    name: syncspace-backend
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # MONGO_URI — set this in Render dashboard as a secret env var
      - key: MONGO_URI
        sync: false
      # JWT secrets — set these in Render dashboard as secret env vars
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # CLIENT_URL: comma-separated list of allowed frontend origins
      - key: CLIENT_URL
        value: https://syncspace-frontend-05u3.onrender.com
      - key: APP_URL
        value: https://syncspace-backend-44cl.onrender.com
      # Cloudinary — set these in Render dashboard as secret env vars
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # SMTP — set these in Render dashboard as secret env vars
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "SyncSpace <noreply@syncspace.io>"

  # ──────────────────────────────────────────────────────────────────────
  # Frontend: React/Vite Static Site
  # Deploy URL: https://syncspace-frontend-05u3.onrender.com
  # ──────────────────────────────────────────────────────────────────────
  - type: web
    name: syncspace-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://syncspace-backend-44cl.onrender.com/api/v1
      - key: VITE_SOCKET_URL
        value: https://syncspace-backend-44cl.onrender.com
